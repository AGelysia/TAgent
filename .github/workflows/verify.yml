name: Verify

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22.22.2"
          cache: npm
          cache-dependency-path: agent-runtime/package-lock.json
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - env:
          MINECRAFT_AGENT_VITEST_JUNIT: ${{ runner.temp }}/runtime-test-results.xml
        run: ./scripts/test.sh
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: verify-linux-test-results-${{ github.sha }}
          path: |
            ${{ runner.temp }}/runtime-test-results.xml
            paper-plugin/build/test-results/test/
            client-mod/build/test-results/test/
          if-no-files-found: warn
          retention-days: 7

  powershell:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22.22.2"
          cache: npm
          cache-dependency-path: agent-runtime/package-lock.json
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - shell: pwsh
        run: ./scripts/check-powershell.ps1
      - shell: pwsh
        run: ./scripts/test.ps1
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: verify-powershell-test-results-${{ github.sha }}
          path: |
            paper-plugin/build/test-results/test/
            client-mod/build/test-results/test/
          if-no-files-found: warn
          retention-days: 7
