name: Release candidate

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-candidate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  assemble:
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install release-check dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends ripgrep
          rg --version
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21.0.11+10"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22.22.2"
          cache: npm
          cache-dependency-path: agent-runtime/package-lock.json
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - env:
          MINECRAFT_AGENT_RELEASE_EVIDENCE_DIR: ${{ runner.temp }}/minecraft-agent-test-results
        run: ./scripts/release-check.sh
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: MinecraftAgent-test-results-${{ github.sha }}
          path: ${{ runner.temp }}/minecraft-agent-test-results/
          if-no-files-found: warn
          retention-days: 14
      - id: version
        shell: bash
        run: printf 'value=%s\n' "$(node -p "require('./agent-runtime/package.json').version")" >>"$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: MinecraftAgent-${{ steps.version.outputs.value }}-${{ github.sha }}
          path: release/
          if-no-files-found: error
          retention-days: 14
