config-version: 1

server:
  id: survival-main

owners: []

runtime:
  url: ws://127.0.0.1:38127/agent
  server-token: ${MINECRAFT_AGENT_SERVER_TOKEN}
  connect-timeout-millis: 2000
  handshake-timeout-millis: 2000

state:
  directory: state

security:
  policy-version: 1
  world-write: OP
  player-write: OP
  server-admin: OWNER
  allow-op-toggle: false

capabilities:
  directory: capabilities
  approvals: []
