configVersion: 2

server:
  id: survival-main

transport:
  host: 127.0.0.1
  port: 38127
  serverToken: ${MINECRAFT_AGENT_SERVER_TOKEN}

model:
  provider: openai
  apiKey: ${OPENAI_API_KEY}
  model: configured-model-name
  timeoutSeconds: 60
  # Configure these integer rates from the selected model's price sheet.
  inputMicroUsdPerMillionTokens: 1000000
  outputMicroUsdPerMillionTokens: 4000000

storage:
  sqlitePath: ./data/runtime.db

logging:
  directory: ./logs
  level: info

knowledge:
  # Configure only existing, private directories relative to this file. Example:
  # roots:
  #   - directory: ./data/knowledge/server-rules
  #     kind: server_rules
  #   - directory: ./data/knowledge/local-docs
  #     kind: local_docs
  roots: []

limits:
  maxConcurrentRequests: 4
  maxQueuedRequests: 32
  maxToolRounds: 8
  maxContextMessages: 30
  maxContextCharacters: 32768
  perPlayerCooldownSeconds: 3
  dailyRequestsPerPlayer: 100
  monthlyBudgetUsd: 50
  # Conservative maximum expected charge for one provider round, in micro-USD.
  providerRoundReservationMicroUsd: 50000

privacy:
  storeConversations: true
  retentionDays: 7
  logMessageContent: false
  logToolCalls: true
